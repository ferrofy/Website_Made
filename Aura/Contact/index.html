<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Aura</title>
    <link rel="icon" href="../Files/Images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../Files/CSS/main.css">
    <link rel="stylesheet" href="../Files/CSS/header.css">
    <link rel="stylesheet" href="../Files/CSS/footer.css">
    <script src="../Files/JS/components.js"></script>
    <script src="../Files/JS/main.js"></script>
</head>
<body>
    <main class="container">
        <h1 class="section-title text-center text-gold">Contact Us</h1>
        <div class="grid">
            <div class="card">
                <h3 class="text-silver mb-3" style="margin-bottom: 20px;">Get in Touch</h3>
                <p style="color: #a9a9a9;">We'd love to hear from you. Experience our high-end aesthetic service before you even step inside.</p>
                <div style="margin-top: 30px; line-height: 2;">
                    <p><strong>Address:</strong><br>123 Aesthetic Blvd, Heritage District</p>
                    <p><strong>Phone:</strong><br>+91 987 654 3210</p>
                    <p><strong>Email:</strong><br>contact@aura.com</p>
                </div>
            </div>
            <div class="card">
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-msg">Message</label>
                        <textarea id="contact-msg" rows="5" placeholder="How can we assist you today?" required></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            showModal("Message Sent", "Thank you for contacting Aura. Our representative will gracefully get back to you shortly.");
            this.reset();
        });
    </script>
</body>
</html>
