<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Restro</title>
    <link rel="stylesheet" href="../Files/CSS/main.css">
    <link rel="stylesheet" href="../Files/CSS/header.css">
    <link rel="stylesheet" href="../Files/CSS/footer.css">
    <script src="../Files/JS/components.js"></script>
    <script src="../Files/JS/main.js"></script>
</head>
<body>
    <main class="container">
        <h1 class="section-title text-center text-gold">Our Menu</h1>
        <div class="grid" id="menu-container">
            
        </div>
    </main>
    
    <script>
        const menuItems = [
            { id: 1, name: "Golden Ribs", price: 45, img: "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80" },
            { id: 2, name: "Silver Sushi Roll", price: 30, img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=800&q=80" },
            { id: 3, name: "Neon Burger", price: 25, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80" },
            { id: 4, name: "Dark Truffle Pasta", price: 35, img: "https://images.unsplash.com/photo-1473093295043-cdd812d0e601?auto=format&fit=crop&w=800&q=80" },
            { id: 5, name: "Platinum Pizza", price: 40, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" },
            { id: 6, name: "Caviar Dreams", price: 80, img: "https://images.unsplash.com/photo-1590189182193-1fd44f2b4048?auto=format&fit=crop&w=800&q=80" },
            { id: 7, name: "Neon Cocktail", price: 15, img: "https://images.unsplash.com/photo-1536935338788-846bb9981813?auto=format&fit=crop&w=800&q=80" },
            { id: 8, name: "Golden Fries", price: 12, img: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?auto=format&fit=crop&w=800&q=80" }
        ];

        const menuContainer = document.getElementById('menu-container');
        for (let i = 0; i < menuItems.length; i++) {
            const item = menuItems[i];
            const card = document.createElement('div');
            card.className = 'card text-center';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}" style="height:200px">
                <h3 class="text-silver">${item.name}</h3>
                <p class="text-gold" style="font-size: 1.2rem; margin: 10px 0;">$${item.price}</p>
                <button class="btn" onclick="addToCart(${item.id}, '${item.name}', ${item.price})">Add to Cart</button>
            `;
            menuContainer.appendChild(card);
        }
    </script>
</body>
</html>
