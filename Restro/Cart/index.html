<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Restro</title>
    <link rel="stylesheet" href="../Files/CSS/main.css">
    <link rel="stylesheet" href="../Files/CSS/header.css">
    <link rel="stylesheet" href="../Files/CSS/footer.css">
    <script src="../Files/JS/components.js"></script>
    <script src="../Files/JS/main.js"></script>
    <style>
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 15px 0; }
        .cart-total { font-size: 1.5rem; text-align: right; margin-top: 20px; }
        .checkout-btn { width: 100%; display: block; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="section-title text-center text-gold">Your Cart</h1>
        <div class="card" id="cart-container">
            
        </div>
        <div class="cart-total text-silver" id="cart-total-display">
            Total: $0
        </div>
        <button class="btn checkout-btn" onclick="checkout()">Checkout & View Live Order</button>
        <button class="btn btn-silver" style="width: 100%; margin-top: 10px; text-align: center;" onclick="clearCart()">Clear Cart</button>
    </main>

    <script>
        function renderCart() {
            const cartContainer = document.getElementById('cart-container');
            const totalDisplay = document.getElementById('cart-total-display');
            const cart = getCart();
            
            cartContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartContainer.innerHTML = '<p class="text-center">Your cart is empty.</p>';
            } else {
                for (let i = 0; i < cart.length; i++) {
                    const item = cart[i];
                    total += item.price * item.quantity;

                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div>
                            <h3 class="text-silver">${item.name}</h3>
                            <p>$${item.price} x ${item.quantity}</p>
                        </div>
                        <div class="text-gold" style="font-weight: bold;">
                            $${item.price * item.quantity}
                        </div>
                    `;
                    cartContainer.appendChild(div);
                }
            }
            totalDisplay.innerText = 'Total: $' + total;
        }

        function checkout() {
            const cart = getCart();
            if (cart.length === 0) {
                showModal("Error", "Your cart is empty!");
                return;
            }
            clearCart();
            window.location.href = '../LiveOrder/index.html';
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderCart();
        });
    </script>
</body>
</html>
